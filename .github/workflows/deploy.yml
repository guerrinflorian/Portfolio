name: Deploy to VPS

# Déploiement automatique sur push vers main
# Prérequis GitHub Secrets :
#   VPS_SSH_KEY   - clé privée SSH (ED25519 recommandé)
#   VPS_HOST      - IP ou domaine du VPS
#   VPS_USER      - utilisateur SSH (ex: deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:    # Déclenchement manuel possible

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Installation Node.js 20 LTS
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Installation des dépendances (CI strict)
      - name: Install dependencies
        run: npm ci

      # 4. Génération statique Nuxt
      - name: Generate static site
        run: npm run generate

      # 5. Déploiement via rsync SSH
      - name: Deploy via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: "-avz --delete"
          SOURCE: ".output/public/"
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: "/var/www/florian-guerrin.fr/"
