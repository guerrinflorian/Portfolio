<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Favicon - arbre minimaliste, identité FG -->
  <!-- Tronc -->
  <rect x="15" y="20" width="2" height="8" rx="1" fill="#5a3e2b"/>
  <!-- Branche gauche -->
  <line x1="16" y1="22" x2="10" y2="16" stroke="#8B6340" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Branche droite -->
  <line x1="16" y1="20" x2="22" y2="14" stroke="#8B6340" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Feuillage - trois cercles -->
  <circle cx="16" cy="13" r="6" fill="#2d7a2d" opacity="0.9"/>
  <circle cx="10" cy="15" r="4.5" fill="#3d8e3d" opacity="0.85"/>
  <circle cx="22" cy="13" r="4.5" fill="#3d8e3d" opacity="0.85"/>
  <!-- Lueur - points noeuds -->
  <circle cx="16" cy="19" r="2" fill="#3b82f6" opacity="0.9"/>
</svg>
